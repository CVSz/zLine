apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlinebot-worker
  namespace: zlinebot
  labels:
    app: worker
spec:
  replicas: 4
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: zeaz/zlinebot-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: zlinebot-config
            - secretRef:
                name: bot-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
